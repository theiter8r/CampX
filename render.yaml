services:
  - name: campx-api
    type: web
    runtime: node
    plan: free
    region: oregon
    rootDir: campx-server
    buildCommand: npm ci && npm run db:generate && npm run build
    startCommand: sh -c 'if [ -d prisma/migrations ]; then npx prisma migrate deploy; else npx prisma db push; fi && npm run start'
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: campx-db
          property: connectionString
      - key: FRONTEND_URL
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: ABLY_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false

  - name: campx-web
    type: web
    runtime: static
    rootDir: campx-client
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_API_URL
        sync: false
      - key: VITE_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: VITE_CLOUDINARY_CLOUD_NAME
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET_ITEMS
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET_AVATARS
        sync: false
      - key: VITE_CLOUDINARY_UPLOAD_PRESET_IDS
        sync: false
      - key: VITE_ABLY_API_KEY
        sync: false
      - key: VITE_MAPBOX_ACCESS_TOKEN
        sync: false
      - key: VITE_RAZORPAY_KEY_ID
        sync: false

databases:
  - name: campx-db
    plan: free
    region: oregon
